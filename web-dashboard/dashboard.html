<!DOCTYPE html>
<html>
<head>
    <title>Smart Waste Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .load-btn { background: #4CAF50; }
        .hotspot-btn { background: #ff9800; }
        .done-btn { background: #4CAF50; }
        .delete-btn { background: #f44336; }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        img { border-radius: 6px; }

        .box {
            margin-top: 20px;
            padding: 15px;
            background: white;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>

<h2>♻ Smart Waste Dashboard</h2>

<!-- 🔍 SEARCH + FILTER -->
<input type="text" id="search" placeholder="Search location..." 
       onkeyup="displayData(globalData)">

<select id="filter" onchange="displayData(globalData)">
    <option value="ALL">All</option>
    <option value="Pending">Pending</option>
    <option value="Completed">Completed</option>
</select>

<button class="load-btn" onclick="loadComplaints()">Load</button>
<button class="hotspot-btn" onclick="loadHotspots()">🔥 Hotspots</button>
<button onclick="showChart()">📊 Chart</button>

<table id="table"></table>

<div id="hotspots" class="box"></div>
<canvas id="chart" class="box"></canvas>

<script>

let globalData = [];

// 🚀 AUTO LOAD
window.onload = loadComplaints;


// 🔄 LOAD DATA
function loadComplaints() {
    fetch("http://10.148.220.230:8080/api/complaints")
    .then(res => res.json())
    .then(data => {
        globalData = data;
        displayData(data);
    });
}


// 📋 DISPLAY DATA (WITH SEARCH + FILTER)
function displayData(data) {

    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    let table = document.getElementById("table");

    table.innerHTML = `
    <tr>
        <th>ID</th>
        <th>Description</th>
        <th>Location</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Image</th>
        <th>Action</th>
    </tr>`;

    data
    .filter(c => 
        (filter === "ALL" || c.status === filter) &&
        (
            (c.location || "").toLowerCase().includes(search) ||
            (c.description || "").toLowerCase().includes(search)
        )
    )
    .forEach(c => {

        let row = table.insertRow();

        row.insertCell(0).innerText = c.id;
        row.insertCell(1).innerText = c.description;
        row.insertCell(2).innerText = c.location;
        row.insertCell(3).innerText = c.status;
        row.insertCell(4).innerText = c.priority;

        // 🖼 IMAGE
        let imgCell = row.insertCell(5);

        if (c.imageUrl && c.imageUrl !== "no_image") {
            let img = document.createElement("img");
            img.src = "data:image/jpeg;base64," + c.imageUrl;
            img.width = 70;
            img.height = 70;
            imgCell.appendChild(img);
        } else {
            imgCell.innerText = "No Image";
        }

        // 🔥 ACTION BUTTONS
        let actionCell = row.insertCell(6);

        let doneBtn = document.createElement("button");
        doneBtn.innerText = "✔";
        doneBtn.className = "done-btn";
        doneBtn.onclick = () => updateStatus(c.id);

        let delBtn = document.createElement("button");
        delBtn.innerText = "🗑";
        delBtn.className = "delete-btn";
        delBtn.onclick = () => deleteComplaint(c.id);

        actionCell.appendChild(doneBtn);
        actionCell.appendChild(delBtn);
    });
}


// ✔ UPDATE STATUS
function updateStatus(id) {
    fetch(`http://10.148.220.230:8080/api/complaints/${id}/status?status=Completed`, {
        method: "PUT"
    }).then(() => loadComplaints());
}


// 🗑 DELETE
function deleteComplaint(id) {
    if (!confirm("Delete this complaint?")) return;

    fetch(`http://10.148.220.230:8080/api/complaints/${id}`, {
        method: "DELETE"
    }).then(() => loadComplaints());
}


// 🔥 HOTSPOTS
function loadHotspots() {
    fetch("http://10.148.220.230:8080/api/complaints/hotspots")
    .then(res => res.json())
    .then(data => {

        let html = "<h3>🔥 Hotspots</h3>";

        data.forEach(h => {
            let color = h[1] >= 5 ? "red" : h[1] >= 3 ? "orange" : "green";

            html += `<p style="color:${color}; font-weight:bold;">
                     ${h[0]} → ${h[1]} complaints
                     </p>`;
        });

        document.getElementById("hotspots").innerHTML = html;
    });
}


// 📊 CHART
function showChart() {

    let counts = {HIGH:0, MEDIUM:0, LOW:0};

    globalData.forEach(c => {
        counts[c.priority]++;
    });

    new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: ["HIGH", "MEDIUM", "LOW"],
            datasets: [{
                label: "Complaints",
                data: [counts.HIGH, counts.MEDIUM, counts.LOW]
            }]
        }
    });
}

</script>

</body>
</html>
